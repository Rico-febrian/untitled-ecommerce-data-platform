services:
  # === SOURCE DATABASE ===
  postgres:
    image: postgres:16
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - wal_level=logical
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === MESSAGE BROKER ===
  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: ecommerce-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:${REDPANDA_BROKER_EXTERNAL_PORT}
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:${REDPANDA_BROKER_EXTERNAL_PORT}
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:${REDPANDA_PROXY_EXTERNAL_PORT}
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:${REDPANDA_PROXY_EXTERNAL_PORT}
    ports:
      - "${REDPANDA_BROKER_EXTERNAL_PORT}:${REDPANDA_BROKER_EXTERNAL_PORT}"
      - "${REDPANDA_PROXY_EXTERNAL_PORT}:${REDPANDA_PROXY_EXTERNAL_PORT}"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda-console:
    image: redpandadata/console:v2.6.0
    container_name: ecommerce-redpanda-console
    environment:
      CONFIG_FILEPATH: ""
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "${REDPANDA_CONSOLE_PORT}:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  # === OBJECT STORAGE ===
  minio:
    image: minio/minio:latest
    container_name: ecommerce-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === PROCESSING ===
  spark-master:
    build: ./docker/spark
    container_name: ecommerce-spark-master
    environment:
      - SPARK_MODE=master
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
    ports:
      - "7077:7077"  # Spark master port (worker connect ke sini)
      - "4040:4040"  # Spark job UI (aktif waktu ada job jalan)
      - "8081:8080"  # Spark master UI
    volumes:
      - ./src:/opt/spark-jobs  # Mount source code biar Spark bisa akses job files

  spark-worker:
    build: ./docker/spark
    container_name: ecommerce-spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
    depends_on:
      - spark-master

  # === CDC ===
  kafka-connect:
    image: debezium/connect:2.6
    container_name: ecommerce-kafka-connect
    environment:
      GROUP_ID: 1
      BOOTSTRAP_SERVERS: redpanda:9092
      CONFIG_STORAGE_TOPIC: _connect-configs
      OFFSET_STORAGE_TOPIC: _connect-offsets
      STATUS_STORAGE_TOPIC: _connect-status
    ports:
      - "8083:8083"
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # === ORCHESTRATION ===
  airflow-postgres:
    image: postgres:16
    container_name: ecommerce-airflow-postgres
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB}
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    build: ./docker/airflow
    container_name: ecommerce-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER}:${AIRFLOW_POSTGRES_PASSWORD}@airflow-postgres:5432/${AIRFLOW_POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    depends_on:
      airflow-postgres:
        condition: service_healthy

  airflow-webserver:
    build: ./docker/airflow
    container_name: ecommerce-airflow-webserver
    command: airflow webserver
    ports:
      - "8082:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER}:${AIRFLOW_POSTGRES_PASSWORD}@airflow-postgres:5432/${AIRFLOW_POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    volumes:
      - ./dags:/opt/airflow/dags
      - ./gold_layer:/opt/airflow/gold_layer
      - ./dev.duckdb:/opt/airflow/dev.duckdb
      - airflow_logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    build: ./docker/airflow
    container_name: ecommerce-airflow-scheduler
    # Docker socket mounted buat trigger spark-submit via docker exec
    # ⚠️ Production: ganti pake Spark REST API atau KubernetesExecutor
    user: root
    command: airflow scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER}:${AIRFLOW_POSTGRES_PASSWORD}@airflow-postgres:5432/${AIRFLOW_POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./dags:/opt/airflow/dags
      - ./gold_layer:/opt/airflow/gold_layer
      - ./dev.duckdb:/opt/airflow/dev.duckdb
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # === DASHBOARD ===
  metabase:
    build: ./docker/metabase
    container_name: ecommerce-metabase
    ports:
      - "3000:3000"
    volumes:
      # Mount DuckDB file (read-only buat Metabase)
      - ./dev.duckdb:/data/dev.duckdb:ro

volumes:
  postgres_data:
  redpanda_data:
  minio_data:
  airflow_postgres_data:
  airflow_logs:
