services:
  # === SOURCE DATABASE ===
  postgres:
    image: postgres:16
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - wal_level=logical
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === MESSAGE BROKER ===
  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: ecommerce-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:${REDPANDA_BROKER_EXTERNAL_PORT}
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:${REDPANDA_BROKER_EXTERNAL_PORT}
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:${REDPANDA_PROXY_EXTERNAL_PORT}
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:${REDPANDA_PROXY_EXTERNAL_PORT}
    ports:
      - "${REDPANDA_BROKER_EXTERNAL_PORT}:${REDPANDA_BROKER_EXTERNAL_PORT}"
      - "${REDPANDA_PROXY_EXTERNAL_PORT}:${REDPANDA_PROXY_EXTERNAL_PORT}"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda-console:
    image: redpandadata/console:v2.6.0
    container_name: ecommerce-redpanda-console
    environment:
      CONFIG_FILEPATH: ""
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "${REDPANDA_CONSOLE_PORT}:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  # === OBJECT STORAGE ===
  minio:
    image: minio/minio:latest
    container_name: ecommerce-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redpanda_data:
  minio_data:
